<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contender Race — Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --surface: #111; --panel: #181818;
    --border: #252525; --border2: #2f2f2f; --text: #f0f0f0; --muted: #555;
    --accent: #e63946; --accent2: #ff6b6b; --gold: #f5c542; --silver: #b0bec5; --bronze: #cd7f32;
  }
  html, body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; }

  /* PIN SCREEN */
  .pin-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 2rem; gap: 1.5rem;
  }
  .pin-title { font-family: 'Barlow Condensed', sans-serif; font-size: 1.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; }
  .pin-sub   { font-size: 0.8rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .pin-input {
    background: var(--surface); border: 2px solid var(--border2); border-radius: 8px;
    color: var(--text); font-family: 'Barlow Condensed', sans-serif; font-size: 2rem;
    font-weight: 700; letter-spacing: 0.5em; outline: none; padding: 0.75rem 1.5rem;
    text-align: center; width: 180px; transition: border-color 0.15s;
  }
  .pin-input:focus { border-color: var(--accent); }
  .pin-input.error { border-color: var(--accent); animation: shake 0.3s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  .pin-btn {
    background: var(--accent); border: none; border-radius: 6px; color: #fff; cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; font-weight: 700;
    letter-spacing: 0.1em; padding: 0.65rem 2rem; text-transform: uppercase;
  }
  .pin-err { color: var(--accent); font-size: 0.8rem; min-height: 1.2em; }

  /* APP */
  #app { display: none; }

  /* HEADER */
  .site-header {
    background: var(--surface); border-bottom: 2px solid var(--accent);
    padding: 0.75rem 1.5rem; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .brand { display: flex; flex-direction: column; line-height: 1; }
  .brand-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 1.4rem; letter-spacing: 0.04em; text-transform: uppercase; }
  .brand-sub  { font-family: 'Barlow Condensed', sans-serif; font-size: 0.65rem; font-weight: 600; letter-spacing: 0.18em; color: var(--accent); text-transform: uppercase; }
  .header-right { display: flex; align-items: center; gap: 1.2rem; }
  .stat-pill { display: flex; flex-direction: column; align-items: center; line-height: 1; }
  .stat-pill .val { font-family: 'Barlow Condensed', sans-serif; font-size: 1.4rem; font-weight: 700; }
  .stat-pill .lbl { font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: background 0.3s; }
  .sync-dot.ok   { background: #4caf50; }
  .sync-dot.busy { background: var(--gold); }
  .sync-dot.err  { background: var(--accent); }

  /* TABS */
  .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.5rem; }
  .tab-btn {
    background: none; border: none; color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif; font-size: 0.85rem; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase; padding: 0.7rem 1.2rem 0.6rem;
    cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }

  .view { display: none; padding: 1.5rem; }
  .view.active { display: block; }
  .section-title { font-family: 'Barlow Condensed', sans-serif; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem; }

  /* FORM */
  .register-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 0.75rem; }
  .form-group { display: flex; flex-direction: column; gap: 0.3rem; }
  .form-group label { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  .form-group input, .form-group select {
    background: var(--surface); border: 1px solid var(--border2); border-radius: 5px;
    color: var(--text); font-family: 'Barlow', sans-serif; font-size: 0.9rem;
    padding: 0.55rem 0.75rem; outline: none; transition: border-color 0.15s; -webkit-appearance: none;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
  .form-group select option { background: #1a1a1a; }
  .btn-primary {
    background: var(--accent); border: none; border-radius: 5px; color: #fff; cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif; font-size: 0.9rem; font-weight: 700;
    letter-spacing: 0.08em; padding: 0.6rem 1.5rem; text-transform: uppercase;
    transition: background 0.15s; width: 100%;
  }
  .btn-primary:hover { background: var(--accent2); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  /* BADGES */
  .heat-badge { font-family: 'Barlow Condensed', sans-serif; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.08em; padding: 0.2rem 0.55rem; border-radius: 3px; text-transform: uppercase; white-space: nowrap; }
  .cat-badge  { font-family: 'Barlow Condensed', sans-serif; font-size: 0.62rem; font-weight: 700; letter-spacing: 0.06em; padding: 0.2rem 0.45rem; border-radius: 3px; text-transform: uppercase; }
  .cat-H  { background: rgba(0,180,216,0.12); color: #00b4d8; }
  .cat-M  { background: rgba(255,100,180,0.12); color: #ff64b4; }
  .cat-MX { background: rgba(140,203,122,0.12); color: #8ecb7a; }

  /* ATHLETE LIST */
  .athlete-row { display: grid; grid-template-columns: 24px 1fr auto auto auto; align-items: center; gap: 0.6rem; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 0.65rem 0.9rem; margin-bottom: 0.4rem; }
  .athlete-num { font-family: 'Barlow Condensed', sans-serif; font-size: 0.75rem; font-weight: 700; color: var(--muted); text-align: center; }
  .a-name  { font-size: 0.9rem; font-weight: 600; }
  .a-alias { font-size: 0.72rem; color: var(--muted); }
  .btn-icon { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; padding: 0.2rem; transition: color 0.15s; }
  .btn-icon:hover { color: var(--accent); }

  /* EDIT MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--panel); border: 1px solid var(--border2); border-radius: 10px; width: 100%; max-width: 420px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
  .modal-head { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem 0.75rem; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .modal-title { font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin: 0; }
  .modal-close { background: none; border: none; color: var(--muted); font-size: 1.4rem; line-height: 1; cursor: pointer; padding: 0.2rem 0.4rem; transition: color 0.15s; }
  .modal-close:hover { color: var(--accent); }
  .modal-body { padding: 1.25rem; overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }
  .modal-actions { display: flex; gap: 0.5rem; padding: 0.85rem 1.25rem; border-top: 1px solid var(--border); flex-shrink: 0; background: var(--panel); }
  .btn-secondary { background: var(--surface); border: 1px solid var(--border2); border-radius: 5px; color: var(--text); cursor: pointer; font-family: 'Barlow Condensed', sans-serif; font-size: 0.85rem; font-weight: 700; letter-spacing: 0.06em; padding: 0.55rem 1rem; text-transform: uppercase; flex: 1; }

  /* TIME BLOCKS */
  .heat-group-header { display: flex; align-items: center; gap: 0.75rem; margin: 1.25rem 0 0.5rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--border); }
  .heat-group-header:first-child { margin-top: 0; }
  .heat-group-time { font-family: 'Barlow Condensed', sans-serif; font-size: 0.75rem; color: var(--muted); letter-spacing: 0.06em; }
  .athlete-block { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 0.6rem; overflow: hidden; }
  .athlete-block-header { display: flex; align-items: center; gap: 0.65rem; padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
  .ab-name  { font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; flex: 1; }
  .ab-alias { font-size: 0.7rem; color: var(--muted); }
  .total-time { font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; font-weight: 700; color: var(--accent); letter-spacing: 0.04em; min-width: 52px; text-align: right; }
  .total-time.complete { color: var(--gold); }
  .chevron { color: var(--muted); font-size: 0.8rem; transition: transform 0.2s; }
  .athlete-block.open .chevron { transform: rotate(180deg); }
  .station-grid { display: none; grid-template-columns: 1fr 1fr; gap: 0.5rem; padding: 0.75rem 1rem; }
  .athlete-block.open .station-grid { display: grid; }
  .station-cell { display: flex; flex-direction: column; gap: 0.2rem; }
  .station-label { font-size: 0.6rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  .time-input-wrap { display: flex; align-items: center; gap: 0.3rem; background: var(--surface); border: 1px solid var(--border2); border-radius: 4px; padding: 0.3rem 0.5rem; transition: border-color 0.15s; }
  .time-input-wrap:focus-within { border-color: var(--accent); }
  .time-field { background: none; border: none; color: var(--text); font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; font-weight: 600; outline: none; width: 36px; text-align: center; }
  .clock-field { background: none; border: none; color: var(--text); font-family: 'Barlow Condensed', sans-serif; font-size: 1.05rem; font-weight: 600; outline: none; width: 100%; }
  .clock-field::-webkit-calendar-picker-indicator { filter: invert(0.6); }
  .time-sep { color: var(--muted); font-family: 'Barlow Condensed', sans-serif; font-size: 0.9rem; }

  .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 0.88rem; }
  .empty strong { display: block; font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; color: var(--border2); margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 0.08em; }

  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--accent); color: #fff; font-family: 'Barlow Condensed', sans-serif; font-size: 0.85rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.55rem 1.25rem; border-radius: 5px; transition: transform 0.3s ease; z-index: 999; pointer-events: none; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 480px) {
    .site-header { padding: 0.6rem 1rem; }
    .view { padding: 1rem; }
    .form-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- PIN -->
<div class="pin-screen" id="pinScreen">
  <div>
    <div class="brand-name" style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.8rem;letter-spacing:0.06em;text-transform:uppercase;text-align:center">Contender Race</div>
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:600;letter-spacing:0.2em;color:#e63946;text-transform:uppercase;text-align:center;margin-top:2px">Admin</div>
  </div>
  <p class="pin-sub">Ingresa el PIN de acceso</p>
  <input class="pin-input" type="password" id="pinInput" maxlength="6" inputmode="numeric" placeholder="···" onkeydown="if(event.key==='Enter')checkPin()">
  <button class="pin-btn" onclick="checkPin()">Entrar</button>
  <p class="pin-err" id="pinErr"></p>
</div>

<!-- APP -->
<div id="app">
  <header class="site-header">
    <div class="brand">
      <span class="brand-name">Contender Race</span>
      <span class="brand-sub">Admin · Vol. 1</span>
    </div>
    <div class="header-right">
      <div class="stat-pill"><span class="val" id="statAthletes">—</span><span class="lbl">Atletas</span></div>
      <div class="stat-pill"><span class="val" id="statComplete">—</span><span class="lbl">Completos</span></div>
      <div class="sync-dot" id="syncDot"></div>
    </div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('registro')">Registro</button>
    <button class="tab-btn" onclick="switchTab('tiempos')">Tiempos</button>
    <button class="tab-btn" onclick="switchTab('inventario')">Inventario</button>
  </div>

  <!-- REGISTRO -->
  <div id="tab-registro" class="view active">
    <div class="register-card">
      <p class="section-title">Nuevo atleta</p>
      <div class="form-grid">
        <div class="form-group"><label>Categoría</label>
          <select id="inCat" onchange="toggleMixedFields()">
            <option value="">— selecciona —</option>
            <option value="H">Hombre</option>
            <option value="M">Mujer</option>
            <option value="MX">Mixto</option>
          </select>
        </div>
        <div class="form-group" id="grpEquipo" style="display:none"><label>Nombre del equipo</label><input type="text" id="inEquipo" placeholder="Ej. Los Truenos" autocomplete="off"></div>
        <div class="form-group"><label id="lblNombre">Nombre completo</label><input type="text" id="inNombre" placeholder="Ej. Carlos Mendoza" autocomplete="off"></div>
        <div class="form-group" id="grpNombre2" style="display:none"><label>Segundo integrante</label><input type="text" id="inNombre2" placeholder="Ej. Ana López" autocomplete="off"></div>
        <div class="form-group" id="grpAlias"><label id="lblAlias">Alias / Apodo</label><input type="text" id="inAlias" placeholder="Ej. El Tanque" autocomplete="off"></div>
        <div class="form-group" id="grpAlias2" style="display:none"><label>Alias integrante 2</label><input type="text" id="inAlias2" placeholder="Ej. La Flecha" autocomplete="off"></div>
        <div class="form-group"><label>Heat</label><select id="inHeat"><option value="">— selecciona —</option></select></div>
        <div class="form-group"><label id="lblColor">Color playera</label>
          <select id="inColor" onchange="fillSizeSelect(document.getElementById('inTalla'),this.value,'')">
            <option value="">— color —</option>
            <option value="Amarilla">Amarilla</option>
            <option value="Negra">Negra</option>
          </select>
        </div>
        <div class="form-group"><label id="lblTalla">Talla playera</label>
          <select id="inTalla"><option value="">— talla —</option></select>
        </div>
        <div class="form-group" id="grpColor2" style="display:none"><label>Color playera 2</label>
          <select id="inColor2" onchange="fillSizeSelect(document.getElementById('inTalla2'),this.value,'')">
            <option value="">— color —</option>
            <option value="Amarilla">Amarilla</option>
            <option value="Negra">Negra</option>
          </select>
        </div>
        <div class="form-group" id="grpTalla2" style="display:none"><label>Talla playera 2</label>
          <select id="inTalla2"><option value="">— talla —</option></select>
        </div>
      </div>
      <button class="btn-primary" id="btnRegister" onclick="registerAthlete()">＋ Registrar atleta</button>
    </div>
    <p class="section-title">Inscritos</p>
    <div id="athleteList"><div class="empty"><strong>Cargando...</strong></div></div>
  </div>

  <!-- TIEMPOS -->
  <div id="tab-tiempos" class="view">
    <p class="section-title">Captura de tiempos (MM:SS)</p>
    <div id="timeBlocks"><div class="empty"><strong>Cargando...</strong></div></div>
  </div>

  <div id="tab-inventario" class="view">
    <p class="section-title">Inventario de playeras</p>
    <div id="inventoryView"><div class="empty"><strong>Cargando...</strong></div></div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal" onclick="if(event.target===this)closeEdit()">
  <div class="modal">
    <div class="modal-head">
      <p class="modal-title">Editar atleta</p>
      <button class="modal-close" onclick="closeEdit()" aria-label="Cerrar">✕</button>
    </div>
    <div class="modal-body">
    <div class="form-grid">
      <div class="form-group"><label>Nombre completo</label><input type="text" id="editNombre" autocomplete="off"></div>
      <div class="form-group"><label id="editLblAlias">Alias</label><input type="text" id="editAlias" autocomplete="off"></div>
      <div class="form-group" id="editGrpAlias2" style="display:none"><label>Alias integrante 2</label><input type="text" id="editAlias2" autocomplete="off"></div>
      <div class="form-group"><label>Heat</label><select id="editHeat"></select></div>
      <div class="form-group"><label>Categoría</label>
        <select id="editCat" onchange="toggleEditMixedFields()">
          <option value="H">Hombre</option>
          <option value="M">Mujer</option>
          <option value="MX">Mixto</option>
        </select>
      </div>
      <div class="form-group" id="editGrpEquipo" style="display:none"><label>Nombre del equipo</label><input type="text" id="editEquipo" autocomplete="off"></div>
      <div class="form-group" id="editGrpNombre2" style="display:none"><label>Segundo integrante</label><input type="text" id="editNombre2" autocomplete="off"></div>
      <div class="form-group"><label id="editLblColor">Color playera</label>
        <select id="editColor" onchange="fillSizeSelect(document.getElementById('editTalla'),this.value,document.getElementById('editTalla').dataset.cur||'')">
          <option value="">— color —</option>
          <option value="Amarilla">Amarilla</option>
          <option value="Negra">Negra</option>
        </select>
      </div>
      <div class="form-group"><label id="editLblTalla">Talla playera</label>
        <select id="editTalla"><option value="">— talla —</option></select>
      </div>
      <div class="form-group" id="editGrpColor2" style="display:none"><label>Color playera 2</label>
        <select id="editColor2" onchange="fillSizeSelect(document.getElementById('editTalla2'),this.value,document.getElementById('editTalla2').dataset.cur||'')">
          <option value="">— color —</option>
          <option value="Amarilla">Amarilla</option>
          <option value="Negra">Negra</option>
        </select>
      </div>
      <div class="form-group" id="editGrpTalla2" style="display:none"><label>Talla playera 2</label>
        <select id="editTalla2"><option value="">— talla —</option></select>
      </div>
    </div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeEdit()">Cancelar</button>
      <button class="btn-primary" style="flex:1" onclick="saveEdit()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── PIN ──
const PIN = '369';
function checkPin(){
  const v=document.getElementById('pinInput').value;
  if(v===PIN){
    document.getElementById('pinScreen').style.display='none';
    document.getElementById('app').style.display='block';
    init();
  } else {
    const inp=document.getElementById('pinInput');
    inp.classList.add('error');
    document.getElementById('pinErr').textContent='PIN incorrecto';
    setTimeout(()=>{inp.classList.remove('error');inp.value='';document.getElementById('pinErr').textContent='';},1000);
  }
}

// ── CONFIG ──
const SUPABASE_URL='https://ktfwkbaxjmpvtdbjzwdg.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0ZndrYmF4am1wdnRkYmp6d2RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MzU1OTksImV4cCI6MjA5NzMxMTU5OX0.sLj3a9JEqvdPWuPLO9AoH6TUBoLxRAYxLT0NI87HDDU';
const HEADERS={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation'};
// (Los 14 retos ya no se capturan; el total se calcula con hora_inicio y hora_fin)
// 21 horarios de 8:00 a 18:00 cada 30 min. Cada heat admite 2 atletas (HEAT_CAP).
const HEAT_CAP=2;
const HEATS=Array.from({length:21},(_,i)=>{const l=String.fromCharCode(65+i),t=8*60+i*30;return{letter:l,label:'Heat '+l,time:String(Math.floor(t/60)).padStart(2,'0')+':'+String(t%60).padStart(2,'0')};});

// Catálogo de playeras
const SHIRT_COLORS=['Amarilla','Negra'];
const SHIRT_SIZES=['M','L','XL'];
let inventory={}; // { 'Amarilla|M': stock, ... }

function invKey(color,talla){return color+'|'+talla;}
function invStock(color,talla){const v=inventory[invKey(color,talla)];return v===undefined?0:v;}

function populateHeatSelect(sel,currentVal){
  sel.innerHTML='<option value="">— selecciona —</option>';
  HEATS.forEach(h=>{
    const taken=athletes.filter(a=>a.heat===h.letter).length;
    const full=taken>=HEAT_CAP;
    const o=document.createElement('option');
    o.value=h.letter;
    o.textContent=h.label+' — '+h.time+' ('+taken+'/'+HEAT_CAP+')'+(full?' · LLENO':'');
    // Allow keeping the current value when editing even if full
    if(full && h.letter!==currentVal) o.disabled=true;
    sel.appendChild(o);
  });
}

let athletes=[], timesMap={}, editingId=null, saveTimers={};

function heatInfo(l){return HEATS.find(h=>h.letter===l)||{label:'Heat '+l,time:''};}
function heatColor(l){const c=['#00b4d8','#7b2fff','#ff9f1c','#e63946','#8ecb7a','#f5c542','#ff64b4','#00c896','#ff4500','#8888ff','#c0c0c0','#ffcc00'];return c[(l.charCodeAt(0)-65)%c.length];}
function catLabel(c){return c==='H'?'Hombre':c==='M'?'Mujer':'Mixto';}
function fmtTime(s){if(!s&&s!==0)return'—';const sign=s<0?'-':'';s=Math.abs(s);const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return sign+(h>0?String(h).padStart(2,'0')+':':'')+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');}
// Parsea "HH:MM:SS" (o "MM:SS") a segundos del día. Devuelve null si inválido o vacío.
function clockToSec(str){
  if(!str)return null;
  const p=str.trim().split(':').map(x=>parseInt(x,10));
  if(p.some(isNaN))return null;
  if(p.length===3)return p[0]*3600+p[1]*60+p[2];
  if(p.length===2)return p[0]*60+p[1];
  return null;
}
// Total = hora_fin - hora_inicio (en segundos). Cruza medianoche si fin<inicio (poco probable aquí).
function athleteTotal(id){
  const a=athletes.find(x=>x.id===id);
  if(!a)return{sum:0,complete:false,hasStart:false,hasEnd:false};
  const ini=clockToSec(a.hora_inicio), fin=clockToSec(a.hora_fin);
  const hasStart=ini!==null, hasEnd=fin!==null;
  if(!hasStart||!hasEnd)return{sum:0,complete:false,hasStart,hasEnd};
  let diff=fin-ini; if(diff<0)diff+=24*3600;
  return{sum:diff,complete:true,hasStart,hasEnd};
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function setSyncDot(s){const d=document.getElementById('syncDot');d.className='sync-dot '+s;}
function showToast(msg,isErr){const el=document.getElementById('toast');el.textContent=msg;el.style.background=isErr?'#c0392b':'var(--accent)';el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2000);}

async function sbFetch(path,method='GET',body=null){
  const opts={method,headers:{...HEADERS}};
  if(body)opts.body=JSON.stringify(body);
  const res=await fetch(SUPABASE_URL+path,opts);
  if(!res.ok){const e=await res.text();throw new Error(e);}
  const text=await res.text();
  return text?JSON.parse(text):null;
}

async function loadAll(){
  setSyncDot('busy');
  try{
    const[ath,tms,inv]=await Promise.all([
      sbFetch('/rest/v1/athletes?select=*&order=created_at.asc'),
      sbFetch('/rest/v1/times?select=*'),
      sbFetch('/rest/v1/inventory?select=*')
    ]);
    athletes=ath||[];
    timesMap={};
    (tms||[]).forEach(r=>{if(!timesMap[r.athlete_id])timesMap[r.athlete_id]={};timesMap[r.athlete_id][r.station]=r.seconds;});
    inventory={};
    (inv||[]).forEach(r=>{inventory[invKey(r.color,r.talla)]=r.stock;});
    setSyncDot('ok');
    populateHeatSelect(document.getElementById('inHeat'));
    refreshShirtSelects();
    renderAthleteList();
    renderTimeBlocks();
    renderInventory();
    updateStats();
  }catch(e){setSyncDot('err');showToast('Error de conexión',true);}
}

// Descuenta 1 pieza del inventario (descuento simple) y persiste
async function decrementStock(color,talla){
  if(!color||!talla)return;
  const k=invKey(color,talla);
  const cur=inventory[k]===undefined?0:inventory[k];
  const next=Math.max(0,cur-1);
  inventory[k]=next;
  try{
    await fetch(SUPABASE_URL+'/rest/v1/inventory?color=eq.'+encodeURIComponent(color)+'&talla=eq.'+encodeURIComponent(talla),{
      method:'PATCH',headers:HEADERS,body:JSON.stringify({stock:next})
    });
  }catch(e){/* el valor local ya quedó; se re-sincroniza en el próximo load */}
}

// Llena un <select> de tallas para un color dado, deshabilitando agotadas
function fillSizeSelect(sel,color,currentVal){
  sel.innerHTML='<option value="">— talla —</option>';
  SHIRT_SIZES.forEach(sz=>{
    const stock=invStock(color,sz);
    // si esta combinación no existe en el catálogo (ej. Negra M), no la muestres
    if(inventory[invKey(color,sz)]===undefined && sz!==currentVal) return;
    const o=document.createElement('option');
    o.value=sz;
    o.textContent=sz+' ('+stock+')'+(stock<=0?' · agotada':'');
    if(stock<=0 && sz!==currentVal) o.disabled=true;
    sel.appendChild(o);
  });
}

function refreshShirtSelects(){
  // Registro individual
  const c1=document.getElementById('inColor');
  if(c1 && c1.value) fillSizeSelect(document.getElementById('inTalla'),c1.value,'');
}

  document.getElementById('grpEquipo').style.display=isMx?'flex':'none';
  document.getElementById('grpNombre2').style.display=isMx?'flex':'none';
  document.getElementById('grpColor2').style.display=isMx?'flex':'none';
  document.getElementById('grpTalla2').style.display=isMx?'flex':'none';
  document.getElementById('lblColor').textContent=isMx?'Color playera 1':'Color playera';
  document.getElementById('lblTalla').textContent=isMx?'Talla playera 1':'Talla playera';
  document.getElementById('lblNombre').textContent=isMx?'Primer integrante':'Nombre completo';
  document.getElementById('grpAlias').style.display='flex';
  document.getElementById('lblAlias').textContent=isMx?'Alias integrante 1':'Alias / Apodo';
  document.getElementById('grpAlias2').style.display=isMx?'flex':'none';
}

  const isMx=document.getElementById('editCat').value==='MX';
  document.getElementById('editGrpEquipo').style.display=isMx?'flex':'none';
  document.getElementById('editGrpNombre2').style.display=isMx?'flex':'none';
  document.getElementById('editGrpAlias2').style.display=isMx?'flex':'none';
  document.getElementById('editLblAlias').textContent=isMx?'Alias integrante 1':'Alias';
  document.getElementById('editGrpColor2').style.display=isMx?'flex':'none';
  document.getElementById('editGrpTalla2').style.display=isMx?'flex':'none';
  document.getElementById('editLblColor').textContent=isMx?'Color playera 1':'Color playera';
  document.getElementById('editLblTalla').textContent=isMx?'Talla playera 1':'Talla playera';
}

async function registerAthlete(){
  const nombre=document.getElementById('inNombre').value.trim();
  const alias=document.getElementById('inAlias').value.trim();
  const heat=document.getElementById('inHeat').value;
  const cat=document.getElementById('inCat').value;
  const nombre2=document.getElementById('inNombre2').value.trim();
  const equipo=document.getElementById('inEquipo').value.trim();
  if(!nombre){showToast('Falta el nombre',true);return;}
  if(!heat){showToast('Selecciona un heat',true);return;}
  if(!cat){showToast('Selecciona categoría',true);return;}
  if(cat==='MX'){
    if(!equipo){showToast('Falta el nombre del equipo',true);return;}
    if(!nombre2){showToast('Falta el segundo integrante',true);return;}
  }
  // Cupo del heat
  const taken=athletes.filter(a=>a.heat===heat).length;
  if(taken>=HEAT_CAP){showToast('Ese heat ya está lleno',true);return;}

  // Playeras
  const color=document.getElementById('inColor').value;
  const talla=document.getElementById('inTalla').value;
  if(!color||!talla){showToast('Selecciona color y talla de playera',true);return;}
  if(invStock(color,talla)<=0){showToast(color+' '+talla+' agotada',true);return;}
  let color2=null,talla2=null;
  if(cat==='MX'){
    color2=document.getElementById('inColor2').value;
    talla2=document.getElementById('inTalla2').value;
    if(!color2||!talla2){showToast('Selecciona playera del 2º integrante',true);return;}
    // Si ambas playeras son la misma combinación, se necesitan 2 en stock
    if(color===color2&&talla===talla2){
      if(invStock(color,talla)<2){showToast(color+' '+talla+': solo queda 1',true);return;}
    }else if(invStock(color2,talla2)<=0){showToast(color2+' '+talla2+' agotada',true);return;}
  }

  const btn=document.getElementById('btnRegister');btn.disabled=true;setSyncDot('busy');
  const alias2=cat==='MX'?document.getElementById('inAlias2').value.trim():'';
  const a={id:uid(),nombre,alias:alias||(cat==='MX'?(nombre.split(' ')[0]):nombre.split(' ')[0]),heat,cat,
           nombre2:cat==='MX'?nombre2:null, equipo:cat==='MX'?equipo:null,
           alias2:cat==='MX'?(alias2||nombre2.split(' ')[0]):null,
           color,talla, color2:cat==='MX'?color2:null, talla2:cat==='MX'?talla2:null,
           hora_inicio:null, hora_fin:null};
  try{
    await sbFetch('/rest/v1/athletes','POST',a);
    athletes.push(a);timesMap[a.id]={};
    // Descuento simple de inventario
    await decrementStock(color,talla);
    if(cat==='MX') await decrementStock(color2,talla2);
    document.getElementById('inNombre').value='';document.getElementById('inAlias').value='';
    document.getElementById('inHeat').value='';document.getElementById('inCat').value='';
    document.getElementById('inNombre2').value='';document.getElementById('inEquipo').value='';
    document.getElementById('inAlias2').value='';
    document.getElementById('inColor').value='';document.getElementById('inTalla').innerHTML='<option value="">— talla —</option>';
    document.getElementById('inColor2').value='';document.getElementById('inTalla2').innerHTML='<option value="">— talla —</option>';
    toggleMixedFields();
    populateHeatSelect(document.getElementById('inHeat'));
    setSyncDot('ok');showToast('✓ '+a.alias+' registrado');
    renderAthleteList();renderTimeBlocks();renderInventory();updateStats();
  }catch(e){setSyncDot('err');showToast('Error al registrar',true);}
  btn.disabled=false;
}

async function removeAthlete(id){
  if(!confirm('¿Eliminar atleta?'))return;
  const a=athletes.find(x=>x.id===id);
  setSyncDot('busy');
  try{
    await sbFetch('/rest/v1/athletes?id=eq.'+id,'DELETE');
    // Devolver playeras al inventario
    if(a){
      if(a.color&&a.talla) await incrementStock(a.color,a.talla);
      if(a.color2&&a.talla2) await incrementStock(a.color2,a.talla2);
    }
    athletes=athletes.filter(a=>a.id!==id);delete timesMap[id];
    setSyncDot('ok');showToast('Atleta eliminado');
    populateHeatSelect(document.getElementById('inHeat'));
    renderAthleteList();renderTimeBlocks();renderInventory();updateStats();
  }catch(e){setSyncDot('err');showToast('Error al eliminar',true);}
}

async function incrementStock(color,talla){
  if(!color||!talla)return;
  const k=invKey(color,talla);
  const cur=inventory[k]===undefined?0:inventory[k];
  const next=cur+1;
  inventory[k]=next;
  try{
    await fetch(SUPABASE_URL+'/rest/v1/inventory?color=eq.'+encodeURIComponent(color)+'&talla=eq.'+encodeURIComponent(talla),{
      method:'PATCH',headers:HEADERS,body:JSON.stringify({stock:next})
    });
  }catch(e){}
}

function openEdit(id){
  const a=athletes.find(x=>x.id===id);if(!a)return;
  editingId=id;
  document.getElementById('editNombre').value=a.nombre;
  document.getElementById('editAlias').value=a.alias;
  populateHeatSelect(document.getElementById('editHeat'),a.heat);
  document.getElementById('editHeat').value=a.heat;
  document.getElementById('editCat').value=a.cat;
  document.getElementById('editNombre2').value=a.nombre2||'';
  document.getElementById('editAlias2').value=a.alias2||'';
  document.getElementById('editEquipo').value=a.equipo||'';
  // Shirt 1
  document.getElementById('editColor').value=a.color||'';
  const t1=document.getElementById('editTalla'); t1.dataset.cur=a.talla||'';
  fillSizeSelect(t1,a.color||'',a.talla||''); t1.value=a.talla||'';
  // Shirt 2
  document.getElementById('editColor2').value=a.color2||'';
  const t2=document.getElementById('editTalla2'); t2.dataset.cur=a.talla2||'';
  fillSizeSelect(t2,a.color2||'',a.talla2||''); t2.value=a.talla2||'';
  toggleEditMixedFields();
  document.getElementById('editModal').classList.add('open');
}
function closeEdit(){editingId=null;document.getElementById('editModal').classList.remove('open');}
async function saveEdit(){
  if(!editingId)return;
  const a0=athletes.find(a=>a.id===editingId);
  // Snapshot del estado previo de playeras ANTES de cualquier mutación
  const hadColor1=!!(a0&&a0.color), hadColor2=!!(a0&&a0.color2), prevHeat=a0?a0.heat:null;
  const nombre=document.getElementById('editNombre').value.trim();
  const alias=document.getElementById('editAlias').value.trim();
  const heat=document.getElementById('editHeat').value;
  const cat=document.getElementById('editCat').value;
  const nombre2=document.getElementById('editNombre2').value.trim();
  const alias2=document.getElementById('editAlias2').value.trim();
  const equipo=document.getElementById('editEquipo').value.trim();
  const color=document.getElementById('editColor').value;
  const talla=document.getElementById('editTalla').value;
  const color2=document.getElementById('editColor2').value;
  const talla2=document.getElementById('editTalla2').value;
  if(!nombre||!heat||!cat){showToast('Completa todos los campos',true);return;}
  if(cat==='MX'&&(!equipo||!nombre2)){showToast('Completa equipo y segundo integrante',true);return;}
  // Cupo: si cambió de heat, validar que el nuevo no esté lleno (excluyendo a este atleta)
  if(heat!==prevHeat){
    const taken=athletes.filter(a=>a.heat===heat && a.id!==editingId).length;
    if(taken>=HEAT_CAP){showToast('Ese heat ya está lleno',true);return;}
  }
  setSyncDot('busy');
  const payload={nombre,alias,heat,cat,nombre2:cat==='MX'?nombre2:null,equipo:cat==='MX'?equipo:null,
                 alias2:cat==='MX'?(alias2||null):null,
                 color:color||null,talla:talla||null,
                 color2:cat==='MX'?(color2||null):null,talla2:cat==='MX'?(talla2||null):null};
  try{
    await sbFetch('/rest/v1/athletes?id=eq.'+editingId,'PATCH',payload);
    // Descuento al ASIGNAR playera por primera vez (antes no tenía)
    if(!hadColor1 && color && talla) await decrementStock(color,talla);
    if(cat==='MX' && !hadColor2 && color2 && talla2) await decrementStock(color2,talla2);
    const idx=athletes.findIndex(a=>a.id===editingId);
    if(idx>=0)athletes[idx]={...athletes[idx],...payload};
    setSyncDot('ok');showToast('✓ Guardado');closeEdit();
    populateHeatSelect(document.getElementById('inHeat'));
    renderAthleteList();renderTimeBlocks();renderInventory();
  }catch(e){setSyncDot('err');showToast('Error al guardar',true);}
}

// Guarda hora_inicio u hora_fin (campo: 'hora_inicio' | 'hora_fin')
function saveClockTime(aid,field,value){
  const a=athletes.find(x=>x.id===aid); if(!a)return;
  a[field]=value||null;
  const{sum,complete}=athleteTotal(aid);
  const totalEl=document.getElementById('total-'+aid);
  if(totalEl){totalEl.textContent=complete?fmtTime(sum):'—';totalEl.classList.toggle('complete',complete);}
  updateStats();
  clearTimeout(saveTimers[aid+'_'+field]);
  saveTimers[aid+'_'+field]=setTimeout(async()=>{
    setSyncDot('busy');
    try{
      const payload={}; payload[field]=value||null;
      const res=await fetch(SUPABASE_URL+'/rest/v1/athletes?id=eq.'+aid,{
        method:'PATCH',headers:HEADERS,body:JSON.stringify(payload)
      });
      if(!res.ok)throw new Error(await res.text());
      setSyncDot('ok');
    }catch(e){setSyncDot('err');showToast('No se guardó la hora',true);}
  },800);
}

function switchTab(name){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['registro','tiempos','inventario'][i]===name));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='inventario') renderInventory();
}

function renderInventory(){
  const el=document.getElementById('inventoryView');
  if(!el)return;
  // Build from catalog combos that exist in inventory
  const rows=[];
  SHIRT_COLORS.forEach(color=>{
    SHIRT_SIZES.forEach(talla=>{
      const k=invKey(color,talla);
      if(inventory[k]===undefined)return; // combo no existe (ej. Negra M)
      rows.push({color,talla,stock:inventory[k]});
    });
  });
  if(!rows.length){el.innerHTML='<div class="empty"><strong>Sin inventario</strong>Carga el catálogo en Supabase.</div>';return;}
  const total=rows.reduce((s,r)=>s+r.stock,0);
  el.innerHTML=`<div class="lb-table" style="background:var(--panel);border:1px solid var(--border);border-radius:8px;overflow:hidden">`+
    rows.map(r=>{
      const pct=r.stock<=0?'agotada':r.stock;
      const col=r.color==='Amarilla'?'#f5c542':'#888';
      const low=r.stock<=2&&r.stock>0, out=r.stock<=0;
      const valColor=out?'#e63946':(low?'#f5a623':'#4caf50');
      return`<div style="display:grid;grid-template-columns:14px 1fr auto;align-items:center;gap:0.75rem;padding:0.7rem 1rem;border-bottom:1px solid var(--border)">
        <span style="width:10px;height:10px;border-radius:50%;background:${col};display:inline-block"></span>
        <span style="font-size:0.9rem;font-weight:600">${r.color} · Talla ${r.talla}</span>
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:700;color:${valColor}">${out?'AGOTADA':r.stock+' pzs'}</span>
      </div>`;
    }).join('')+
    `<div style="padding:0.7rem 1rem;display:flex;justify-content:space-between;align-items:center;background:var(--surface)">
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted)">Total disponible</span>
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:1.2rem;font-weight:800;color:var(--accent)">${total} pzs</span>
    </div></div>`;
}

function displayName(a){
  // For Mixto, the team name is the headline; members shown as subtitle
  if(a.cat==='MX') return a.equipo || a.alias || a.nombre;
  return a.nombre;
}
function displaySub(a){
  if(a.cat==='MX'){
    const m1=a.nombre+(a.alias?' ('+a.alias+')':'');
    const m2=a.nombre2?(a.nombre2+(a.alias2?' ('+a.alias2+')':'')):'';
    const members=[m1,m2].filter(Boolean).join(' · ');
    return members || a.alias;
  }
  return a.alias;
}

function renderAthleteList(){
  const el=document.getElementById('athleteList');
  if(!athletes.length){el.innerHTML='<div class="empty"><strong>Sin atletas aún</strong>Registra al primero arriba.</div>';return;}
  el.innerHTML=athletes.map((a,i)=>{
    const hi=heatInfo(a.heat),hc=heatColor(a.heat);
    return`<div class="athlete-row">
      <span class="athlete-num">${i+1}</span>
      <div><div class="a-name">${displayName(a)}</div><div class="a-alias">${displaySub(a)}</div></div>
      <span class="heat-badge" style="background:${hc}22;color:${hc}">${hi.label} ${hi.time}</span>
      <span class="cat-badge cat-${a.cat}">${catLabel(a.cat)}</span>
      <div style="display:flex;gap:0.2rem">
        <button class="btn-icon" onclick="openEdit('${a.id}')">✎</button>
        <button class="btn-icon" onclick="removeAthlete('${a.id}')">✕</button>
      </div>
    </div>`;
  }).join('');
}

function renderTimeBlocks(){
  const el=document.getElementById('timeBlocks');
  if(!athletes.length){el.innerHTML='<div class="empty"><strong>Sin atletas</strong>Registra atletas primero.</div>';return;}
  const groups={};HEATS.forEach(h=>{groups[h.letter]=[];});
  athletes.forEach(a=>{if(!groups[a.heat])groups[a.heat]=[];groups[a.heat].push(a);});
  let html='';
  HEATS.forEach(h=>{
    const list=groups[h.letter];if(!list||!list.length)return;
    const hc=heatColor(h.letter);
    html+=`<div class="heat-group-header"><span class="heat-badge" style="background:${hc}22;color:${hc}">${h.label}</span><span class="heat-group-time">${h.time} hrs</span></div>`;
    list.forEach(a=>{
      const{sum,complete,hasStart,hasEnd}=athleteTotal(a.id);
      const ini=a.hora_inicio||'', fin=a.hora_fin||'';
      const fields=`<div class="station-cell"><span class="station-label">Hora inicio</span>
          <div class="time-input-wrap">
            <input class="clock-field" type="time" step="1" value="${ini}" onchange="saveClockTime('${a.id}','hora_inicio',this.value)">
          </div></div>
        <div class="station-cell"><span class="station-label">Hora término</span>
          <div class="time-input-wrap">
            <input class="clock-field" type="time" step="1" value="${fin}" onchange="saveClockTime('${a.id}','hora_fin',this.value)">
          </div></div>`;
      html+=`<div class="athlete-block" id="block-${a.id}">
        <div class="athlete-block-header" onclick="toggleBlock('${a.id}')">
          <span class="cat-badge cat-${a.cat}">${catLabel(a.cat)}</span>
          <div style="flex:1"><div class="ab-name">${displayName(a)}</div><div class="ab-alias">${displaySub(a)}</div></div>
          <span class="total-time ${complete?'complete':''}" id="total-${a.id}">${complete?fmtTime(sum):'—'}</span>
          <span class="chevron">▼</span>
        </div>
        <div class="station-grid">${fields}</div>
      </div>`;
    });
  });
  el.innerHTML=html;
}

function toggleBlock(id){document.getElementById('block-'+id).classList.toggle('open');}

function updateStats(){
  document.getElementById('statAthletes').textContent=athletes.length;
  document.getElementById('statComplete').textContent=athletes.filter(a=>athleteTotal(a.id).complete).length;
}

function init(){
  populateHeatSelect(document.getElementById('inHeat'));
  populateHeatSelect(document.getElementById('editHeat'));
  loadAll();
}
</script>
